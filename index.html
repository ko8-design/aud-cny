<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>澳元 · 人民币</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0d;
    --surface: #111815;
    --card: #161e1b;
    --border: #1f2e29;
    --accent: #3dffa0;
    --accent-dim: #1a4a32;
    --warn: #ffb547;
    --warn-dim: #3a2a0a;
    --red: #ff5c5c;
    --text: #e8f0ec;
    --muted: #6b8478;
    --mono: 'DM Mono', monospace;
    --serif: 'Noto Serif SC', serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--serif); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 0 16px 80px; position: relative; z-index: 1; }

  header { padding: 28px 0 8px; display: flex; justify-content: space-between; align-items: flex-end; }
  .logo { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
  .logo span { color: var(--accent); }
  .header-time { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: right; }

  .rate-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; margin: 20px 0 12px; position: relative; overflow: hidden; }
  .rate-card::before { content: ''; position: absolute; top: -60px; right: -60px; width: 180px; height: 180px; background: radial-gradient(circle, rgba(61,255,160,0.06) 0%, transparent 70%); pointer-events: none; }
  .pair-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .live-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(61,255,160,0.4)} 50%{opacity:0.6;box-shadow:0 0 0 4px rgba(61,255,160,0)} }
  .rate-main { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 6px; }
  .rate-value { font-family: var(--mono); font-size: 52px; font-weight: 300; letter-spacing: -0.02em; color: var(--text); line-height: 1; }
  .rate-value.loading { color: var(--muted); animation: blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .rate-change { font-family: var(--mono); font-size: 13px; padding: 4px 8px; border-radius: 6px; }
  .rate-change.up { color: var(--accent); background: var(--accent-dim); }
  .rate-change.down { color: var(--red); background: rgba(255,92,92,0.1); }
  .rate-change.flat { color: var(--muted); background: rgba(107,132,120,0.1); }
  .rate-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }

  .converter { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 12px; }
  .converter-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 14px; text-transform: uppercase; }
  .converter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .currency-tag { font-family: var(--mono); font-size: 13px; color: var(--accent); background: var(--accent-dim); padding: 8px 12px; border-radius: 8px; min-width: 52px; text-align: center; letter-spacing: 0.05em; }
  .amount-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: var(--mono); font-size: 18px; color: var(--text); outline: none; -webkit-appearance: none; transition: border-color 0.2s; }
  .amount-input:focus { border-color: var(--accent); }
  .amount-display { flex: 1; padding: 10px 14px; font-family: var(--mono); font-size: 18px; color: var(--accent); border: 1px solid var(--accent-dim); border-radius: 8px; }
  .swap-btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 10px; margin: 4px 0; background: transparent; border: 1px dashed var(--border); border-radius: 8px; color: var(--muted); cursor: pointer; font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; gap: 6px; transition: all 0.2s; }
  .swap-btn:active { background: var(--accent-dim); color: var(--accent); }

  .section-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin: 24px 0 10px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .analysis-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
  .analysis-date { background: var(--accent-dim); padding: 10px 18px; font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 0.15em; display: flex; justify-content: space-between; align-items: center; }
  .analysis-body { padding: 18px; }
  .analysis-tag { display: inline-block; font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; padding: 3px 8px; border-radius: 4px; margin-bottom: 10px; text-transform: uppercase; }
  .tag-up { background: var(--accent-dim); color: var(--accent); }
  .tag-down { background: rgba(255,92,92,0.1); color: var(--red); }
  .tag-flat { background: rgba(107,132,120,0.1); color: var(--muted); }
  .analysis-text { font-size: 14px; line-height: 1.75; color: #c8d8d2; font-weight: 300; }
  .analysis-points { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .analysis-point { display: flex; gap: 10px; font-size: 13px; line-height: 1.6; color: var(--muted); }
  .point-dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; margin-top: 8px; flex-shrink: 0; }

  .edit-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-family: var(--mono); font-size: 9px; color: var(--muted); cursor: pointer; letter-spacing: 0.1em; transition: all 0.2s; }
  .edit-btn.active { background: var(--warn-dim); border-color: var(--warn); color: var(--warn); }
  .editable-area { display: none; flex-direction: column; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--border); background: var(--surface); }
  .editable-area.show { display: flex; }
  .edit-textarea { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-family: var(--serif); font-size: 13px; line-height: 1.7; resize: vertical; min-height: 90px; outline: none; }
  .edit-textarea:focus { border-color: var(--warn); }
  .edit-textarea::placeholder { color: var(--muted); }
  .save-btn { background: var(--warn-dim); border: 1px solid var(--warn); border-radius: 8px; padding: 10px; font-family: var(--mono); font-size: 11px; color: var(--warn); cursor: pointer; letter-spacing: 0.1em; }

  .event-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 8px; }
  .event-header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .event-date-badge { background: var(--warn-dim); border: 1px solid rgba(255,181,71,0.2); border-radius: 8px; padding: 6px 10px; text-align: center; flex-shrink: 0; }
  .event-date-day { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--warn); line-height: 1; }
  .event-date-mon { font-family: var(--mono); font-size: 9px; color: rgba(255,181,71,0.6); letter-spacing: 0.1em; }
  .event-info { flex: 1; }
  .event-name { font-size: 14px; color: var(--text); margin-bottom: 3px; font-weight: 400; }
  .event-impact { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; display: flex; align-items: center; gap: 6px; }
  .impact-high { color: var(--red); }
  .impact-mid { color: var(--warn); }
  .impact-low { color: var(--muted); }
  .idot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: currentColor; margin-right: 2px; opacity: 0.25; }
  .idot.on { opacity: 1; }
  .event-detail { display: none; padding: 12px 16px 14px; font-size: 13px; color: var(--muted); line-height: 1.7; border-top: 1px solid var(--border); }
  .event-detail.show { display: block; }

  .add-event-section { background: var(--surface); border: 1px dashed var(--border); border-radius: 14px; padding: 16px; margin-bottom: 8px; }
  .add-toggle { width: 100%; background: transparent; border: none; color: var(--muted); font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; cursor: pointer; text-align: center; padding: 4px; transition: color 0.2s; }
  .add-form { display: none; flex-direction: column; gap: 10px; margin-top: 14px; }
  .add-form.show { display: flex; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-input { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: var(--serif); font-size: 13px; outline: none; width: 100%; }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); font-size: 12px; }
  .form-select { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; width: 100%; -webkit-appearance: none; }
  .add-submit { background: var(--accent-dim); border: 1px solid var(--accent); border-radius: 8px; padding: 11px; color: var(--accent); font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; cursor: pointer; }

  .sparkline-wrap { margin-top: 16px; height: 50px; }
  .sparkline-wrap svg { width: 100%; height: 100%; }

  .history-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .history-row:last-child { border-bottom: none; }
  .history-date { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .history-rate { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .history-chg { font-family: var(--mono); font-size: 11px; }
  .history-chg.up { color: var(--accent); }
  .history-chg.down { color: var(--red); }

  .refresh-btn { position: fixed; bottom: 24px; right: 20px; width: 48px; height: 48px; background: var(--accent); border: none; border-radius: 50%; color: var(--bg); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(61,255,160,0.3); z-index: 100; transition: transform 0.2s; }
  .refresh-btn:active { transform: scale(0.92); }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { font-family: var(--mono); font-size: 11px; color: var(--red); padding: 8px 12px; background: rgba(255,92,92,0.08); border-radius: 8px; margin-top: 8px; }
  .skeleton { background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; height: 14px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo"><span>AUD</span> · CNY</div>
    <div class="header-time" id="headerTime">--:--<br>---</div>
  </header>

  <!-- RATE -->
  <div class="rate-card">
    <div class="pair-label"><div class="live-dot"></div>澳元 / 人民币 实时汇率</div>
    <div class="rate-main">
      <div class="rate-value loading" id="rateValue">···</div>
      <div class="rate-change flat" id="rateChange">--</div>
    </div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:4px">
      1 AUD = <span id="rateSmall">--</span> CNY
    </div>
    <div class="sparkline-wrap" id="sparklineWrap" style="display:none">
      <svg id="sparklineSvg" viewBox="0 0 300 50" preserveAspectRatio="none"></svg>
    </div>
    <div class="rate-sub">
      <span>更新 <span id="updateTime">--</span></span>
      <span>freecurrencyapi</span>
    </div>
  </div>

  <!-- CONVERTER -->
  <div class="converter">
    <div class="converter-label">快速换算</div>
    <div class="converter-row">
      <div class="currency-tag" id="fromTag">AUD</div>
      <input class="amount-input" type="number" id="fromInput" value="1000" inputmode="decimal">
    </div>
    <button class="swap-btn" id="swapBtn">⇅ &nbsp;切换方向</button>
    <div class="converter-row">
      <div class="currency-tag" id="toTag" style="color:var(--warn);background:var(--warn-dim)">CNY</div>
      <div class="amount-display" id="toOutput">--</div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="section-title">近7日走势</div>
  <div class="analysis-card">
    <div class="analysis-body" id="historyBody">
      <div class="skeleton" style="margin-bottom:8px"></div>
      <div class="skeleton" style="width:70%"></div>
    </div>
  </div>

  <!-- ANALYSIS -->
  <div class="section-title">每日简报</div>
  <div class="analysis-card">
    <div class="analysis-date">
      <span id="analysisDate">--</span>
      <button class="edit-btn" id="editToggle" onclick="toggleEdit()">编辑</button>
    </div>
    <div class="analysis-body">
      <span class="analysis-tag tag-flat" id="trendTag">走势待更新</span>
      <div class="analysis-text" id="analysisMain">点击右上角「编辑」更新今日分析。</div>
      <div class="analysis-points" id="analysisBullets"></div>
    </div>
    <div class="editable-area" id="editArea">
      <select class="form-input" id="trendSelect" style="font-family:var(--mono);font-size:12px;-webkit-appearance:none">
        <option value="up">↑ 澳元走强</option>
        <option value="down">↓ 澳元走弱</option>
        <option value="flat">→ 横盘整理</option>
      </select>
      <textarea class="edit-textarea" id="mainTextInput" rows="3" placeholder="今日主要分析（1-2句话概括）"></textarea>
      <textarea class="edit-textarea" id="bulletsInput" rows="4" placeholder="要点，每行一条：&#10;RBA维持利率不变&#10;中国PMI低于预期"></textarea>
      <button class="save-btn" onclick="saveAnalysis()">✓ 保存简报</button>
    </div>
  </div>

  <!-- EVENTS -->
  <div class="section-title">重大事件预告</div>
  <div id="eventsContainer"></div>

  <div class="add-event-section">
    <button class="add-toggle" onclick="toggleAddForm()">＋ 添加事件</button>
    <div class="add-form" id="addForm">
      <input class="form-input" type="text" id="evtName" placeholder="事件名称（如：RBA利率决议）">
      <div class="form-row">
        <input class="form-input" type="date" id="evtDate">
        <select class="form-select" id="evtImpact">
          <option value="high">高影响</option>
          <option value="mid" selected>中影响</option>
          <option value="low">低影响</option>
        </select>
      </div>
      <textarea class="form-input" id="evtDetail" rows="3" placeholder="说明（可选）：预期方向、注意事项等"></textarea>
      <button class="add-submit" onclick="addEvent()">添加预告</button>
    </div>
  </div>

  <div id="errorMsg"></div>
</div>

<button class="refresh-btn" id="refreshBtn" onclick="fetchRate()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="23 4 23 10 17 10"></polyline>
    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
  </svg>
</button>

<script>
const API_KEY = 'fca_live_XhaCNBDwFlQ39EBfEXj0k41R1UnjIslgIITNczYp';
const PFX = 'audcny_';
let currentRate = null;
let isFlipped = false;

// CLOCK
function updateClock() {
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('headerTime').innerHTML =
    now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) +
    '<br>周' + days[now.getDay()];
}
setInterval(updateClock, 1000); updateClock();

// FETCH
async function fetchRate() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('errorMsg').innerHTML = '';
  try {
    const res = await fetch(`https://api.freecurrencyapi.com/v1/latest?apikey=${API_KEY}&base_currency=AUD&currencies=CNY`);
    const data = await res.json();
    if (data.data && data.data.CNY) {
      const rate = data.data.CNY;
      updateRateDisplay(rate);
      currentRate = rate;
      localStorage.setItem(PFX+'lastRate', rate.toString());
      // history
      const today = new Date().toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
      let hist = JSON.parse(localStorage.getItem(PFX+'history') || '[]');
      const idx = hist.findIndex(h => h.date === today);
      if (idx >= 0) hist[idx].rate = rate; else hist.push({date:today, rate});
      if (hist.length > 7) hist = hist.slice(-7);
      localStorage.setItem(PFX+'history', JSON.stringify(hist));
      renderHistory();
    } else throw new Error(data.message || '数据异常');
  } catch(e) {
    document.getElementById('errorMsg').innerHTML = `<div class="error-msg">⚠ 汇率获取失败：${e.message}</div>`;
    const cached = localStorage.getItem(PFX+'lastRate');
    if (cached) { currentRate = parseFloat(cached); updateRateDisplay(parseFloat(cached), true); }
  }
  btn.classList.remove('spinning');
}

function updateRateDisplay(rate, fromCache=false) {
  const el = document.getElementById('rateValue');
  el.classList.remove('loading');
  el.textContent = rate.toFixed(4);
  document.getElementById('rateSmall').textContent = rate.toFixed(4);
  const hist = JSON.parse(localStorage.getItem(PFX+'history') || '[]');
  const changeEl = document.getElementById('rateChange');
  if (hist.length >= 2) {
    const prev = hist[hist.length-2].rate;
    const diff = rate - prev, pct = (diff/prev*100).toFixed(2);
    const sign = diff >= 0 ? '+' : '';
    changeEl.textContent = `${sign}${pct}%`;
    changeEl.className = 'rate-change ' + (diff > 0.0001 ? 'up' : diff < -0.0001 ? 'down' : 'flat');
  } else { changeEl.textContent = '今日'; changeEl.className = 'rate-change flat'; }
  document.getElementById('updateTime').textContent =
    new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  updateConverter();
}

// CONVERTER
document.getElementById('fromInput').addEventListener('input', updateConverter);
function updateConverter() {
  const rate = currentRate || parseFloat(localStorage.getItem(PFX+'lastRate'));
  if (!rate) return;
  const amt = parseFloat(document.getElementById('fromInput').value) || 0;
  const result = isFlipped ? amt/rate : amt*rate;
  document.getElementById('toOutput').textContent =
    result.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
}
document.getElementById('swapBtn').addEventListener('click', () => {
  isFlipped = !isFlipped;
  const ft = document.getElementById('fromTag'), tt = document.getElementById('toTag');
  ft.textContent = isFlipped ? 'CNY' : 'AUD';
  ft.style.color = isFlipped ? 'var(--warn)' : 'var(--accent)';
  ft.style.background = isFlipped ? 'var(--warn-dim)' : 'var(--accent-dim)';
  tt.textContent = isFlipped ? 'AUD' : 'CNY';
  tt.style.color = isFlipped ? 'var(--accent)' : 'var(--warn)';
  tt.style.background = isFlipped ? 'var(--accent-dim)' : 'var(--warn-dim)';
  updateConverter();
});

// HISTORY
function renderHistory() {
  const hist = JSON.parse(localStorage.getItem(PFX+'history') || '[]');
  const body = document.getElementById('historyBody');
  if (!hist.length) { body.innerHTML = '<span style="color:var(--muted);font-size:12px;font-family:var(--mono)">数据积累中…</span>'; return; }

  if (hist.length >= 2) {
    const rates = hist.map(h=>h.rate), min=Math.min(...rates), max=Math.max(...rates), range=max-min||0.0001;
    const W=300,H=50,P=4;
    const pts = rates.map((r,i) => `${P+(i/(rates.length-1))*(W-P*2)},${H-P-((r-min)/range)*(H-P*2)}`);
    const lp = pts[pts.length-1].split(',');
    document.getElementById('sparklineSvg').innerHTML = `
      <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3dffa0" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="#3dffa0" stop-opacity="0"/>
      </linearGradient></defs>
      <polygon points="${P},${H} ${pts.join(' ')} ${W-P},${H}" fill="url(#sg)"/>
      <polyline points="${pts.join(' ')}" fill="none" stroke="#3dffa0" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${lp[0]}" cy="${lp[1]}" r="3" fill="#3dffa0"/>`;
    document.getElementById('sparklineWrap').style.display = 'block';
  }

  let html = '';
  for (let i=hist.length-1; i>=0; i--) {
    const h=hist[i], prev=hist[i-1];
    let chg = '<span class="history-chg" style="color:var(--muted)">首日</span>';
    if (prev) {
      const d=h.rate-prev.rate, p=(d/prev.rate*100).toFixed(2);
      chg = `<span class="history-chg ${d>0.0001?'up':d<-0.0001?'down':''}">${d>=0?'+':''}${p}%</span>`;
    }
    html += `<div class="history-row"><span class="history-date">${h.date}</span><span class="history-rate">${parseFloat(h.rate).toFixed(4)}</span>${chg}</div>`;
  }
  body.innerHTML = html;
}

// ANALYSIS
function loadAnalysis() {
  const saved = JSON.parse(localStorage.getItem(PFX+'analysis') || '{}');
  const today = new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric'});
  document.getElementById('analysisDate').textContent = saved.date || today;
  if (saved.trend) {
    const tags={up:'↑ 澳元走强',down:'↓ 澳元走弱',flat:'→ 横盘整理'};
    const cls={up:'tag-up',down:'tag-down',flat:'tag-flat'};
    document.getElementById('trendTag').textContent = tags[saved.trend];
    document.getElementById('trendTag').className = 'analysis-tag '+cls[saved.trend];
  }
  if (saved.main) document.getElementById('analysisMain').textContent = saved.main;
  if (saved.bullets && saved.bullets.length)
    document.getElementById('analysisBullets').innerHTML = saved.bullets.map(b =>
      `<div class="analysis-point"><div class="point-dot"></div><span>${b}</span></div>`).join('');
}
function toggleEdit() {
  const area=document.getElementById('editArea'), btn=document.getElementById('editToggle');
  const show=!area.classList.contains('show');
  area.classList.toggle('show',show); btn.classList.toggle('active',show);
  btn.textContent = show ? '收起' : '编辑';
}
function saveAnalysis() {
  const trend=document.getElementById('trendSelect').value;
  const main=document.getElementById('mainTextInput').value.trim();
  const bullets=document.getElementById('bulletsInput').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const today=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric'});
  localStorage.setItem(PFX+'analysis', JSON.stringify({trend,main,bullets,date:today}));
  loadAnalysis(); toggleEdit();
}

// EVENTS
function loadEvents() {
  const events = JSON.parse(localStorage.getItem(PFX+'events') || '[]');
  renderEvents(events);
}
function renderEvents(events) {
  const container = document.getElementById('eventsContainer');
  if (!events.length) { container.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:11px;padding:8px 0">暂无预告事件</div>'; return; }
  events.sort((a,b)=>new Date(a.date)-new Date(b.date));
  const impMap = {
    high:{label:'高影响',cls:'impact-high',dots:[1,1,1]},
    mid:{label:'中影响',cls:'impact-mid',dots:[1,1,0]},
    low:{label:'低影响',cls:'impact-low',dots:[1,0,0]}
  };
  container.innerHTML = events.map((evt,i) => {
    const d=new Date(evt.date+'T00:00:00');
    const day=d.getDate(), mon=d.toLocaleDateString('zh-CN',{month:'short'});
    const imp=impMap[evt.impact]||impMap.mid;
    const isPast=d<new Date(new Date().setHours(0,0,0,0));
    const dots=imp.dots.map(on=>`<span class="idot${on?' on':''}">`).join('')+'</span></span></span>';
    return `<div class="event-card" style="${isPast?'opacity:0.4':''}">
      <div class="event-header" onclick="toggleEvt(${i})">
        <div class="event-date-badge">
          <div class="event-date-day">${day}</div>
          <div class="event-date-mon">${mon}</div>
        </div>
        <div class="event-info">
          <div class="event-name">${evt.name}</div>
          <div class="event-impact ${imp.cls}"><span class="idot on"></span><span class="idot ${imp.dots[1]?'on':''}"></span><span class="idot ${imp.dots[2]?'on':''}"></span> ${imp.label}</div>
        </div>
        <span style="font-family:var(--mono);color:var(--muted)" id="arr-${i}">›</span>
      </div>
      <div class="event-detail" id="det-${i}">
        ${evt.detail ? evt.detail+'<br><br>' : ''}
        <button onclick="deleteEvt(${i})" style="background:transparent;border:1px solid var(--red);border-radius:6px;padding:5px 12px;color:var(--red);font-family:var(--mono);font-size:10px;cursor:pointer;letter-spacing:0.1em">删除</button>
      </div>
    </div>`;
  }).join('');
}
function toggleEvt(i) {
  const d=document.getElementById(`det-${i}`), a=document.getElementById(`arr-${i}`);
  const show=!d.classList.contains('show');
  d.classList.toggle('show',show);
  if(a) a.textContent=show?'⌄':'›';
}
function deleteEvt(i) {
  let events=JSON.parse(localStorage.getItem(PFX+'events')||'[]');
  events.sort((a,b)=>new Date(a.date)-new Date(b.date));
  events.splice(i,1);
  localStorage.setItem(PFX+'events',JSON.stringify(events));
  loadEvents();
}
function toggleAddForm() {
  document.getElementById('addForm').classList.toggle('show');
  document.getElementById('evtDate').value=new Date().toISOString().split('T')[0];
}
function addEvent() {
  const name=document.getElementById('evtName').value.trim();
  const date=document.getElementById('evtDate').value;
  if(!name||!date) return;
  let events=JSON.parse(localStorage.getItem(PFX+'events')||'[]');
  events.push({name,date,impact:document.getElementById('evtImpact').value,detail:document.getElementById('evtDetail').value.trim()});
  localStorage.setItem(PFX+'events',JSON.stringify(events));
  document.getElementById('evtName').value='';
  document.getElementById('evtDetail').value='';
  document.getElementById('addForm').classList.remove('show');
  loadEvents();
}

// DEFAULT EVENTS
function initDefaults() {
  if(localStorage.getItem(PFX+'events')) return;
  localStorage.setItem(PFX+'events', JSON.stringify([
    {name:'RBA 利率决议',date:'2026-04-01',impact:'high',detail:'澳联储货币政策会议。利率走向直接影响澳元，意外调整时波动显著放大。'},
    {name:'中国 PMI 数据',date:'2026-03-31',impact:'high',detail:'国家统计局制造业PMI。数据反映中国经济景气度，影响CNY走势与市场情绪。'},
    {name:'澳大利亚就业数据',date:'2026-04-17',impact:'mid',detail:'月度就业人数变化及失业率。超预期数据利好澳元，影响RBA加息预期。'},
  ]));
}

initDefaults(); loadAnalysis(); loadEvents(); renderHistory(); fetchRate();
setInterval(fetchRate, 5*60*1000);
</script>
